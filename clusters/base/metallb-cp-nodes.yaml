apiVersion: v1
kind: ServiceAccount
metadata:
  name: metallb-remove-exclude-lb-label
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metallb-remove-exclude-lb-label
rules:
  - apiGroups: [""]
    resources:
      - nodes
    verbs:
      - get
      - list
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metallb-remove-exclude-lb-label
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: metallb-remove-exclude-lb-label
subjects:
  - kind: ServiceAccount
    name: metallb-remove-exclude-lb-label
    namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: metallb-remove-exclude-lb-label
  namespace: kube-system
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: metallb-remove-exclude-lb-label
          restartPolicy: OnFailure
          containers:
            - name: remove-label
              image: docker.io/mesosphere/kubectl:v1.34.1-alpine
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -eu

                  echo "Removing node.kubernetes.io/exclude-from-external-load-balancers from all nodes..."

                  kubectl label nodes --all \
                    node.kubernetes.io/exclude-from-external-load-balancers- \
                    --overwrite

                  kubectl get nodes \
                    -L node.kubernetes.io/exclude-from-external-load-balancers
