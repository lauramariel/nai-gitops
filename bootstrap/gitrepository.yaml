apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: nai-gitops
  namespace: kommander
spec:
  interval: 1m
  url: https://github.com/pipoe2h/nai-gitops
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nai-gitops
  namespace: kommander
spec:
  force: false
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: nai-gitops
  path: ./
  prune: true
