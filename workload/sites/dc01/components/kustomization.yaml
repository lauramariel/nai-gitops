apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../components

patches:
  - target:
      kind: StorageClass
      name: nai-nfs-storage
    patch: |-
      - op: replace
        path: /parameters/nfsServer
        value: files-10-42-245-83.sslip.nutanixdemo.com
      - op: replace
        path: /parameters/nfsServerName
        value: files
