apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nai-db-dc01
  namespace: nai-db
spec:
  bootstrap:
    initdb:
      database: nai_iep
      owner: nai-api-user
      secret:
        name: nai-db-app
      postInitSQL:
        - ALTER ROLE "nai-api-user" WITH SUPERUSER CREATEDB CREATEROLE;

  backup:
    barmanObjectStore:
      destinationPath: s3://nai-cnpg-dc01/
      endpointURL: http://10.8.39.139
      s3Credentials:
        accessKeyId:
          name: objects-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: objects-creds
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 8
    retentionPolicy: "30d"
