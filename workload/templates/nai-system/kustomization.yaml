apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - helmrepository.yaml
  - helmreleases.yaml
  - sa.yaml
  - clusterrolebinding.yaml

configMapGenerator:
  - name: nai-operators-values
    namespace: nai-system
    files:
      - values.yaml=nai-downsized-values.yaml
  - name: nai-core-values
    namespace: nai-system
    files:
      - values.yaml=nai-downsized-values.yaml

generatorOptions:
  disableNameSuffixHash: true
